<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metallama &mdash; HYGEOS</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="banner">
      <img class="banner-img" src="/static/assets/hygeos-banner.png" alt="Hygeos banner" />
    </header>

    <header class="page-header">
      <div class="header-container">
        <div class="header-content">
          <img id="hero-logo" class="header-logo" src="/static/assets/logo-carre-noir.svg" alt="Hygeos logo" />
          <div class="header-text">
            <h1 class="hero-title">Meta-llama</h1>
            <p class="subtitle">HYGEOS's &mdash; Dedicated AI Services</p>
          </div>
        </div>
        <div class="theme-toggle" role="group" aria-label="Theme switcher">
          <button class="theme-btn" type="button" data-theme="light" title="Light mode">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <button class="theme-btn" type="button" data-theme="system" title="System">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>
          </button>
          <button class="theme-btn" type="button" data-theme="dark" title="Dark mode">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="container">
      <!-- <section class="info-banner">
        <div class="info-banner-row">
          <div class="info-banner-block">
            <span class="info-banner-label">Use LLMs in vscode:</span>
            <span class="info-banner-label">click model > Manage Language Models > + Add Models > "Ollama" > </span>
            <code class="info-banner-url">http://gpu4.hygeos.com:8010/ollama</code>
          </div>
      </section> -->
      <section>
        <div id="binary-warning" class="binary-warning is-hidden"></div>
        <p id="ui-message" class="ui-message"></p>

        <!-- Hugging Face model search -->
        <div id="hf-panel" class="hf-panel">
          <div id="hf-downloads" class="hf-downloads is-hidden"></div>
          <div class="hf-search-wrap">
            <svg class="hf-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="hf-search" placeholder="Search Hugging Face for GGUF models…" autocomplete="off" spellcheck="false" />
          </div>
          <div id="hf-results" class="hf-results is-hidden"></div>
        </div>
        <hr class="section-separator" />

        <div id="models" class="models-list"></div>
        <div class="summary-container">
          <p id="summary" class="summary"></p>
        </div>
      </section>

      </section>
    </main>

    <!-- Edit Config Modal -->
    <div id="edit-modal" class="modal-overlay is-hidden">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2 id="modal-title">Edit Server Config</h2>
          <button class="modal-close" data-action="modal-close" title="Close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-columns">
            <div class="modal-column">
              <div class="form-group">
                <label for="edit-name">Name</label>
                <input type="text" id="edit-name" />
              </div>
              <div class="form-group remote-only">
                <label for="edit-url">URL</label>
                <input type="text" id="edit-url" />
              </div>
              <div class="form-group managed-only">
                <label for="edit-model-path">Model</label>
                <select id="edit-model-path"></select>
                <p id="edit-model-warning" class="model-not-found-warning is-hidden"></p>
              </div>
              <div class="form-group managed-only">
                <label for="edit-port">Port</label>
                <input type="number" id="edit-port" min="1024" max="65535" />
              </div>
              <div class="form-group managed-only">
                <label for="edit-context-window">Context Window</label>
                <input type="number" id="edit-context-window" min="1" step="1000" />
              </div>
              <div class="form-group managed-only">
                <label for="edit-parallel">Parallel Slots</label>
                <input type="number" id="edit-parallel" min="1" />
              </div>
            </div>
            <div class="modal-column managed-only">
              <div class="form-group form-group-stretch">
                <label for="edit-extra-args">Extra Args (one per line)</label>
                <textarea id="edit-extra-args"></textarea>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" data-action="modal-cancel">Cancel</button>
          <button class="btn-primary" data-action="modal-save">Save</button>
        </div>
      </div>
    </div>

    <footer class="app-footer">
      <div class="footer-content">
        <div class="vram-container">
          <span id="ram-status" class="ram-status">RAM: --</span>
          <div class="ram-graph-wrapper">
            <canvas id="ram-graph" class="ram-graph" width="400" height="60"></canvas>
            <div class="ram-labels">
              <span class="ram-label">100%</span>
              <span class="ram-label">50%</span>
              <span class="ram-label">0%</span>
            </div>
          </div>
          <span id="vram-status" class="vram-status">VRAM: --</span>
          <div class="vram-graph-wrapper">
            <canvas id="vram-graph" class="vram-graph" width="400" height="60"></canvas>
            <div class="vram-labels">
              <span class="vram-label">100%</span>
              <span class="vram-label">50%</span>
              <span class="vram-label">0%</span>
            </div>
          </div>
        </div>
      </div>
    </footer>
    
    <script type="module" src="/static/js/main.js"></script>
  </body>
</html>
